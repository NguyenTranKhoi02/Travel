<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập Admin - Horse Loop</title>
  <link rel="icon" type="image/png" href="images/logoHL.png">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #0b1a14;
      color: #fff;
    }

    .login-box {
      background: rgba(255, 255, 255, 0.05);
      padding: 40px;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .login-box h2 {
      color: var(--secondary);
      margin-bottom: 24px;
      font-size: 24px;
    }

    .login-box input {
      width: 100%;
      padding: 14px;
      margin-bottom: 16px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(0, 0, 0, 0.5);
      color: #fff;
      font-size: 16px;
    }

    .login-box button {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      background: var(--secondary);
      color: #fff;
      border: none;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    .login-box button:hover {
      background: #139f60;
    }

    .error-msg {
      color: #ff5252;
      margin-top: 12px;
      font-size: 14px;
      display: none;
    }
  </style>
  <script src="js/i18n.js"></script>
</head>

<body>
  <div class="login-box">
    <h2>Hệ thống Quản trị</h2>
    <form id="loginForm">
      <input type="email" id="email" placeholder="Email đăng nhập" required>
      <input type="password" id="password" placeholder="Mật khẩu" required>
      <button type="submit" id="loginBtn">Đăng nhập</button>
      <div id="errorMsg" class="error-msg">Sai email hoặc mật khẩu!</div>
    </form>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="js/firebase-init.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const pass = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('errorMsg');

      btn.textContent = 'Đang kiểm tra...';
      err.style.display = 'none';

      try {
        await window.FirebaseAPI.auth.signInWithEmailAndPassword(email, pass);
        window.location.href = 'admin.html';
      } catch (error) {
        console.error(error);
        err.style.display = 'block';
        err.textContent = 'Sai email hoặc mật khẩu!';
        btn.textContent = 'Đăng nhập';
      }
    });

    // Check if already logged in
    window.FirebaseAPI.auth.onAuthStateChanged((user) => {
      if (user) window.location.href = 'admin.html';
    });
  </script>
</body>

</html>
